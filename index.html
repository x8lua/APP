<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="x8 Grab">
<title>x8 Grab</title>
<link rel="apple-touch-icon" href="/icon.png">
<link rel="icon" type="image/png" href="/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,700;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --surface: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.1);
    --border-focus: rgba(255,255,255,0.28);
    --text: #fff;
    --muted: rgba(255,255,255,0.3);
    --muted2: rgba(255,255,255,0.5);
    --blue: #0a84ff;
    --red: #ff453a;
    --radius: 14px;
    --radius-lg: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { background: #000; }

  body {
    background: #000;
    color: var(--text);
    font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100svh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 350px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 430px; margin: 0 auto;
    padding: 20px 20px 80px;
  }

  /* HEADER */
  header {
    padding: 14px 0 28px;
    animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }

  .logo {
    font-family: 'Google Sans', -apple-system, sans-serif;
    font-style: italic; font-weight: 700;
    font-size: 40px; letter-spacing: -2px; line-height: 1;
    color: #fff; user-select: none;
  }

  .logo-sub {
    font-size: 12px; font-weight: 500;
    color: var(--muted); margin-top: 3px; letter-spacing: 0.2px;
  }

  /* PLATFORMS */
  .platforms {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 20px;
    animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.07s both;
  }
  .plat {
    font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted2); background: var(--surface);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }

  /* INPUT CARD */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 10px; overflow: hidden;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.13s both;
    transition: border-color 0.2s;
  }
  .input-card:focus-within { border-color: var(--border-focus); }

  .url-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
  .url-icon { color: var(--muted); flex-shrink: 0; display: flex; }

  .url-input {
    flex: 1; min-width: 0;
    background: none; border: none; outline: none;
    color: #fff;
    font-family: 'Google Sans', -apple-system, sans-serif;
    font-size: 15px; -webkit-appearance: none;
  }
  .url-input::placeholder { color: var(--muted); }

  .paste-btn {
    flex-shrink: 0;
    background: rgba(255,255,255,0.1); border: none; border-radius: 8px;
    color: rgba(255,255,255,0.65);
    font-family: 'Google Sans', -apple-system, sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 6px 12px; cursor: pointer;
    transition: background 0.15s; -webkit-appearance: none;
  }
  .paste-btn:active { background: rgba(255,255,255,0.18); color: #fff; }

  .card-divider { height: 1px; background: var(--border); }

  .fetch-btn {
    width: 100%; background: none; border: none;
    color: var(--blue);
    font-family: 'Google Sans', -apple-system, sans-serif;
    font-size: 15px; font-weight: 600;
    padding: 13px 14px; cursor: pointer;
    text-align: left; display: flex; align-items: center; gap: 8px;
    transition: background 0.15s; -webkit-appearance: none;
  }
  .fetch-btn:active { background: rgba(255,255,255,0.04); }
  .fetch-btn.loading { color: var(--muted); pointer-events: none; }

  /* INFO CARD */
  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden; margin-bottom: 10px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: none;
  }
  .info-card.show { display: block; animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both; }

  .thumb-wrap {
    position: relative; width: 100%; padding-top: 52%;
    background: rgba(255,255,255,0.03); overflow: hidden;
  }
  .thumb-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
  .thumb-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 35%, rgba(0,0,0,0.65) 100%);
  }
  .platform-pill {
    position: absolute; top: 12px; left: 12px;
    font-size: 11px; font-weight: 600;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.85);
  }
  .duration-pill {
    position: absolute; bottom: 12px; right: 12px;
    font-size: 13px; font-weight: 600;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
    padding: 3px 9px; border-radius: 7px; color: #fff;
  }

  .info-body { padding: 16px; }
  .video-title {
    font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .video-uploader { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  .quality-grid { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 18px; }

  .q-btn {
    font-family: 'Google Sans', -apple-system, sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 7px 15px; border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--muted2); cursor: pointer;
    transition: all 0.15s; -webkit-appearance: none;
  }
  .q-btn:active { opacity: 0.7; }
  .q-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 700; }
  .q-btn.audio.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* DOWNLOAD BUTTON */
  .download-btn {
    width: 100%; background: #fff; border: none;
    border-radius: var(--radius); color: #000;
    font-family: 'Google Sans', -apple-system, sans-serif;
    font-weight: 700; font-size: 16px;
    padding: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.15s; -webkit-appearance: none;
  }
  .download-btn:active { transform: scale(0.98); opacity: 0.88; }
  .download-btn.loading { background: rgba(255,255,255,0.07); color: var(--muted); pointer-events: none; }

  /* PROGRESS */
  .progress-wrap { margin-top: 12px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-track { height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width 0.3s ease; }

  /* ERROR */
  .error-msg {
    background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.22);
    border-radius: var(--radius); padding: 12px 14px;
    font-size: 13px; color: var(--red); margin-top: 10px; display: none;
  }
  .error-msg.show { display: block; animation: fadeUp 0.3s ease; }

  /* HINT */
  .hint {
    margin-top: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 13px 15px; font-size: 12.5px;
    color: var(--muted); line-height: 1.55;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) 0.2s both;
  }
  .hint strong { color: var(--muted2); font-weight: 600; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    width: 15px; height: 15px; flex-shrink: 0;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.65s linear infinite;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">x8</div>
    <div class="logo-sub">Video Downloader</div>
  </header>

  <div class="platforms">
    <span class="plat">YouTube</span>
    <span class="plat">Instagram</span>
    <span class="plat">TikTok</span>
    <span class="plat">Douyin</span>
  </div>

  <div class="input-card">
    <div class="url-row">
      <span class="url-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </span>
      <input type="url" class="url-input" id="urlInput"
        placeholder="Paste video link…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      />
      <button class="paste-btn" id="pasteBtn">Paste</button>
    </div>
    <div class="card-divider"></div>
    <button class="fetch-btn" id="detectBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Fetch Video Info
    </button>
  </div>

  <div class="info-card" id="infoCard">
    <div class="thumb-wrap">
      <img id="thumbImg" src="" alt="" />
      <div class="thumb-overlay"></div>
      <span class="platform-pill" id="platformPill"></span>
      <span class="duration-pill" id="durationPill"></span>
    </div>
    <div class="info-body">
      <div class="video-title" id="videoTitle"></div>
      <div class="video-uploader" id="videoUploader"></div>
      <div class="section-label">Quality</div>
      <div class="quality-grid" id="qualityGrid"></div>
      <button class="download-btn" id="downloadBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="hint">
    <strong>iOS tip —</strong> after the download, tap <strong>Downloads ↓</strong> in Safari, long-press the file, then <strong>Save to Files</strong> or <strong>Save Video</strong>.
  </div>

</div>
<script>
  const API = '';
  let selectedQuality = 'best', videoInfo = null;

  const urlInput    = document.getElementById('urlInput');
  const detectBtn   = document.getElementById('detectBtn');
  const infoCard    = document.getElementById('infoCard');
  const errorMsg    = document.getElementById('errorMsg');
  const downloadBtn = document.getElementById('downloadBtn');
  const progressWrap= document.getElementById('progressWrap');
  const progressFill= document.getElementById('progressFill');

  const SEARCH_ICON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`;
  const DL_ICON     = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

  document.getElementById('pasteBtn').addEventListener('click', async () => {
    try { urlInput.value = await navigator.clipboard.readText(); }
    catch { urlInput.focus(); }
  });

  const showError = msg => { errorMsg.textContent = msg; errorMsg.classList.add('show'); };
  const hideError = ()  => errorMsg.classList.remove('show');
  const fmtDur    = s   => s ? `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}` : '';

  detectBtn.addEventListener('click', async () => {
    const url = urlInput.value.trim();
    if (!url) { showError('Paste a video URL first.'); return; }
    hideError(); infoCard.classList.remove('show');
    detectBtn.classList.add('loading');
    detectBtn.innerHTML = '<span class="spinner"></span> Fetching…';
    try {
      const res  = await fetch(`${API}/api/info`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed to fetch info');
      videoInfo = data;
      document.getElementById('thumbImg').src             = data.thumbnail||'';
      document.getElementById('platformPill').textContent = data.platform;
      document.getElementById('durationPill').textContent = fmtDur(data.duration);
      document.getElementById('videoTitle').textContent   = data.title;
      document.getElementById('videoUploader').textContent= data.uploader||'';
      const grid = document.getElementById('qualityGrid');
      grid.innerHTML = '';
      selectedQuality = data.available_qualities[0]||'best';
      data.available_qualities.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'q-btn'+(q==='audio'?' audio':'')+(q===selectedQuality?' active':'');
        btn.textContent = q==='audio' ? '♪ MP3' : q==='best' ? 'Best' : q;
        btn.addEventListener('click', () => { selectedQuality=q; grid.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); });
        grid.appendChild(btn);
      });
      infoCard.classList.add('show');
    } catch(e) { showError(e.message); }
    finally { detectBtn.classList.remove('loading'); detectBtn.innerHTML=`${SEARCH_ICON} Fetch Video Info`; }
  });

  downloadBtn.addEventListener('click', async () => {
    if (!videoInfo) return;
    const url = urlInput.value.trim();
    downloadBtn.classList.add('loading');
    downloadBtn.innerHTML = '<span class="spinner"></span> Downloading…';
    progressWrap.classList.add('show');
    let prog = 0;
    const ticker = setInterval(() => { prog=Math.min(prog+Math.random()*7,84); progressFill.style.width=prog+'%'; }, 350);
    try {
      const res = await fetch(`${API}/api/download`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url,quality:selectedQuality}) });
      if (!res.ok) { const e=await res.json(); throw new Error(e.detail||'Download failed'); }
      clearInterval(ticker); progressFill.style.width='100%';
      const blob = await res.blob();
      const disp = res.headers.get('Content-Disposition')||'';
      const nm   = disp.match(/filename="(.+?)"/);
      const obj  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href=obj; a.download=nm?nm[1]:'video.mp4'; a.click(); URL.revokeObjectURL(obj);
      setTimeout(()=>{ progressWrap.classList.remove('show'); progressFill.style.width='0%'; }, 1500);
    } catch(e) {
      clearInterval(ticker); showError(e.message);
      progressWrap.classList.remove('show'); progressFill.style.width='0%';
    } finally { downloadBtn.classList.remove('loading'); downloadBtn.innerHTML=`${DL_ICON} Download`; }
  });

  urlInput.addEventListener('paste', () => setTimeout(()=>{ if(urlInput.value.trim()) hideError(); }, 80));
</script>
</body>
</html>
